<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visit Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .badges {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      font-size: 12px;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }
     .nav-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 1rem;
    }

    .badge-flask  { background: #dbeafe; color: #1e40af; }
    .badge-redis  { background: #fee2e2; color: #991b1b; }
    .plus         { color: #9ca3af; font-size: 18px; }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 2.5rem 4rem;
      text-align: center;
    }

    .label {
      font-size: 12px;
      font-weight: 600;
      color: #9ca3af;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .count {
      font-size: 96px;
      font-weight: 600;
      color: #111827;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #e5e7eb;
      margin: 16px auto;
    }

    .sublabel {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .redis-key {
      display: inline-block;
      font-family: monospace;
      font-size: 12px;
      color: #6b7280;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 3px 10px;
    }

    .footer {
      font-size: 12px;
      color: black


    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="badges">
      <span class="badge badge-flask">Flask</span>
      <span class="plus">+</span>
      <span class="badge badge-redis">Redis</span>
    </div>

    <div class="card">
      <p class="label">Total visits</p>
      <div class="count">{{ count }}</div>
      <div class="divider"></div>
      <p class="sublabel">times this page has been visited</p>
    
    </div>
    <div class="nav-buttons">
        <div class="nav-btn primary" onclick="showPage('home')">🏠 <a href="/" class="btn">Back</a></div>
        
        
      </div>
    <p class="footer"><b>Refresh the page to increment the counter</b></p>

  </div>
</body>
</html>

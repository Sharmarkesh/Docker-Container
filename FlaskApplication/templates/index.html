<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flask in Docker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #56824E;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Mono', monospace;
      color: #e6edf3;
      padding: 2rem;
    }

    .card {
      background: #274A20;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 3rem 3.5rem;
      max-width: 560px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px;
      right: -60px;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(88,166,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(88,166,255,0.1);
      border: 1px solid rgba(88,166,255,0.25);
      color: #58a6ff;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3fb950;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      color: #e6edf3;
      margin-bottom: 1rem;
    }

    h1 .rocket {
      display: inline-block;
      animation: lift 3s ease-in-out infinite;
    }

    @keyframes lift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    p.sub {
      font-size: 13px;
      color: #8b949e;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .chip {
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      color: #8b949e;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip span.label {
      color: #e6edf3;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <div class="dot"></div>
      Running
    </div>

    <h1>Hello from Flask Application <span class="rocket">🚀</span></h1>

    <p class="sub">
      Welcome  to Sharmarke Sharif  Flask application .Everything is wired up and ready to go.
    </p>

    <div class="meta">
      <div class="chip">Runtime <span class="label">Python 3.x</span></div>
      <div class="chip">Framework <span class="label">Flask</span></div>
      <div class="chip">Container <span class="label">Docker</span></div>
    </div>
  </div>
</body>
</html>
